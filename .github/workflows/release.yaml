name: Release

on:
  release:
    types: [published]

jobs:
  build:
    name: Build Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: uv build --no-sources
      - name: Store built package
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
  # good to still check that the versions match, actually
  publish-pypi:
    name: Publish to PyPI
    needs: [build]
    if: ${{ github.event_name == 'release' && github.event.action == 'published' }}
    runs-on: ubuntu-latest
    environment: release-pypi
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Download built package
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Verify package installs correctly
        run: |
          uv venv /tmp/test-env
          uv pip install --python /tmp/test-env/bin/python dist/*.whl
          /tmp/test-env/bin/python -c "import bada; print(f'Successfully installed bada {bada.__version__}')"
      - name: Publish to PyPI
        run: uv publish dist/*
